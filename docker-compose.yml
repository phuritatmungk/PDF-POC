services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - paddle_models:/root/.paddlex
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8080}
      - LLM_MODEL=${LLM_MODEL:-local-model}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paddle_models:
